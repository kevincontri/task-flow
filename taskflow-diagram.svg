<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="frontendGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#172d4a"/>
    </linearGradient>
    <linearGradient id="backendGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a"/>
      <stop offset="100%" style="stop-color:#153022"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b1f5e"/>
      <stop offset="100%" style="stop-color:#2d1748"/>
    </linearGradient>
    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5c1a1a"/>
      <stop offset="100%" style="stop-color:#461515"/>
    </linearGradient>
    <linearGradient id="dockerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:0.08"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowWhite" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4ade80"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700" letter-spacing="1">TaskFlow — System Architecture</text>
  <text x="600" y="62" text-anchor="middle" fill="#F1F5F9" font-size="12" letter-spacing="0.5">Kanban-style Project &amp; Task Management App</text>

  <!-- ==================== DOCKER COMPOSE BOUNDARY ==================== -->
  <rect x="270" y="240" width="900" height="548" rx="14" fill="url(#dockerGrad)" stroke="#1e88e5" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.9"/>
  <text x="1155" y="260" text-anchor="end" fill="#42a5f5" font-size="11" font-weight="600" letter-spacing="0.5">🐳 DOCKER COMPOSE</text>

  <!-- ==================== CLIENT / BROWSER ==================== -->
  <rect x="30" y="88" width="250" height="130" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="155" y="112" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1.2">CLIENT</text>
  <rect x="50" y="122" width="210" height="28" rx="6" fill="#0f172a" stroke="#475569" stroke-width="0.8"/>
  <text x="155" y="141" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="500">🌐 Web Browser</text>
  <text x="155" y="168" text-anchor="middle" fill="#F1F5F9" font-size="10">JWT stored in AuthContext</text>
  <text x="155" y="184" text-anchor="middle" fill="#F1F5F9" font-size="10">localStorage (quote, lang)</text>
  <text x="155" y="200" text-anchor="middle" fill="#F1F5F9" font-size="10">Drag &amp; Drop interactions</text>

  <!-- ==================== FRONTEND ==================== -->
  <rect x="30" y="260" width="210" height="290" rx="10" fill="url(#frontendGrad)" stroke="#2563eb" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="42" y="270" width="186" height="22" rx="4" fill="#2563eb" opacity="0.2"/>
  <text x="135" y="286" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700" letter-spacing="1">⚡ FRONTEND</text>
  <text x="135" y="306" text-anchor="middle" fill="#38bdf8" font-size="10">React 19 + Vite · :5173</text>

  <!-- Pages -->
  <rect x="46" y="320" width="180" height="52" rx="6" fill="#0f172a" stroke="#1e40af" stroke-width="0.7"/>
  <text x="136" y="337" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">PAGES</text>
  <text x="136" y="352" text-anchor="middle" fill="#cbd5e1" font-size="9">Login · Register</text>
  <text x="136" y="364" text-anchor="middle" fill="#cbd5e1" font-size="9">Dashboard · Board</text>

  <!-- Components -->
  <rect x="46" y="380" width="180" height="56" rx="6" fill="#0f172a" stroke="#1e40af" stroke-width="0.7"/>
  <text x="136" y="397" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">COMPONENTS</text>
  <text x="136" y="411" text-anchor="middle" fill="#cbd5e1" font-size="9">KanbanColumn · TaskCard</text>
  <text x="136" y="423" text-anchor="middle" fill="#cbd5e1" font-size="9">ProjectModal · CommentModal</text>

  <!-- Contexts -->
  <rect x="46" y="444" width="180" height="42" rx="6" fill="#0f172a" stroke="#1e40af" stroke-width="0.7"/>
  <text x="136" y="460" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">CONTEXTS</text>
  <text x="136" y="474" text-anchor="middle" fill="#cbd5e1" font-size="9">AuthContext · LanguageContext</text>

  <!-- API layer -->
  <rect x="46" y="494" width="180" height="38" rx="6" fill="#0f172a" stroke="#1e40af" stroke-width="0.7"/>
  <text x="136" y="510" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">API LAYER</text>
  <text x="136" y="523" text-anchor="middle" fill="#cbd5e1" font-size="9">Axios · React Router v7</text>

  <!-- @dnd-kit label -->
  <text x="136" y="544" text-anchor="middle" fill="#F1F5F9" font-size="8" font-weight="500">@dnd-kit drag-and-drop</text>

  <!-- ==================== BACKEND ==================== -->
  <rect x="310" y="260" width="440" height="290" rx="10" fill="url(#backendGrad)" stroke="#16a34a" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="322" y="270" width="416" height="22" rx="4" fill="#16a34a" opacity="0.2"/>
  <text x="530" y="286" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700" letter-spacing="1">🚀 BACKEND</text>
  <text x="530" y="306" text-anchor="middle" fill="#86efac" font-size="10">FastAPI 0.136 · :8000</text>

  <!-- Routes -->
  <rect x="326" y="320" width="200" height="70" rx="6" fill="#0f172a" stroke="#166534" stroke-width="0.7"/>
  <text x="426" y="337" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">ROUTES</text>
  <text x="426" y="352" text-anchor="middle" fill="#cbd5e1" font-size="9">/auth  (register, login)</text>
  <text x="426" y="365" text-anchor="middle" fill="#cbd5e1" font-size="9">/projects  /tasks  /comments</text>
  <text x="426" y="378" text-anchor="middle" fill="#cbd5e1" font-size="9">/health  /tasks/{id}/move</text>

  <!-- Services -->
  <rect x="534" y="320" width="200" height="70" rx="6" fill="#0f172a" stroke="#166534" stroke-width="0.7"/>
  <text x="634" y="337" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">SERVICES</text>
  <text x="634" y="352" text-anchor="middle" fill="#cbd5e1" font-size="9">Business Logic Layer</text>
  <text x="634" y="365" text-anchor="middle" fill="#cbd5e1" font-size="9">Auth · Projects</text>
  <text x="634" y="378" text-anchor="middle" fill="#cbd5e1" font-size="9">Tasks · Comments</text>

  <!-- Repositories -->
  <rect x="326" y="400" width="200" height="56" rx="6" fill="#0f172a" stroke="#166534" stroke-width="0.7"/>
  <text x="426" y="417" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">REPOSITORIES</text>
  <text x="426" y="432" text-anchor="middle" fill="#cbd5e1" font-size="9">Data-Access Layer</text>
  <text x="426" y="445" text-anchor="middle" fill="#cbd5e1" font-size="9">SQLAlchemy 2.0 async queries</text>

  <!-- Redis Repository -->
  <rect x="534" y="400" width="200" height="56" rx="6" fill="#0f172a" stroke="#166534" stroke-width="0.7"/>
  <text x="634" y="417" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">REDIS REPOSITORY</text>
  <text x="634" y="432" text-anchor="middle" fill="#cbd5e1" font-size="9">redis.asyncio client</text>
  <text x="634" y="445" text-anchor="middle" fill="#cbd5e1" font-size="9">get / set / hash / TTL ops</text>

  <!-- Models + Schemas -->
  <rect x="326" y="466" width="200" height="56" rx="6" fill="#0f172a" stroke="#166534" stroke-width="0.7"/>
  <text x="426" y="483" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">MODELS + SCHEMAS</text>
  <text x="426" y="498" text-anchor="middle" fill="#cbd5e1" font-size="9">SQLAlchemy: User · Project</text>
  <text x="426" y="511" text-anchor="middle" fill="#cbd5e1" font-size="9">Task · Comment + Pydantic v2</text>

  <!-- Core / Security -->
  <rect x="534" y="466" width="200" height="56" rx="6" fill="#0f172a" stroke="#166534" stroke-width="0.7"/>
  <text x="634" y="483" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">CORE</text>
  <text x="634" y="498" text-anchor="middle" fill="#cbd5e1" font-size="9">JWT Auth (python-jose)</text>
  <text x="634" y="511" text-anchor="middle" fill="#cbd5e1" font-size="9">Security · Config · Deps · Enums</text>

  <!-- Alembic + CORS label -->
  <text x="530" y="537" text-anchor="middle" fill="#F1F5F9" font-size="8" font-weight="500">Alembic Migrations · CORS Middleware · Exception Handlers</text>

  <!-- ==================== POSTGRESQL ==================== -->
  <rect x="310" y="600" width="260" height="170" rx="10" fill="url(#dbGrad)" stroke="#8b5cf6" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="322" y="610" width="236" height="22" rx="4" fill="#8b5cf6" opacity="0.2"/>
  <text x="440" y="626" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700" letter-spacing="1">🐘 POSTGRESQL 16</text>
  <text x="440" y="646" text-anchor="middle" fill="#a78bfa" font-size="10">asyncpg · :5433</text>

  <!-- DB Tables -->
  <rect x="326" y="660" width="110" height="46" rx="5" fill="#0f172a" stroke="#6d28d9" stroke-width="0.7"/>
  <text x="381" y="677" text-anchor="middle" fill="#e9d5ff" font-size="9" font-weight="500">📋 users</text>
  <text x="381" y="697" text-anchor="middle" fill="#e9d5ff" font-size="9">📋 projects</text>

  <rect x="444" y="660" width="110" height="46" rx="5" fill="#0f172a" stroke="#6d28d9" stroke-width="0.7"/>
  <text x="499" y="677" text-anchor="middle" fill="#e9d5ff" font-size="9" font-weight="500">📋 tasks</text>
  <text x="499" y="697" text-anchor="middle" fill="#e9d5ff" font-size="9">📋 comments</text>

  <text x="440" y="728" text-anchor="middle" fill="#7c3aed" font-size="8">Alembic-managed schema migrations</text>

  <!-- ==================== REDIS ==================== -->
  <rect x="600" y="600" width="260" height="170" rx="10" fill="url(#redisGrad)" stroke="#ef4444" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="612" y="610" width="236" height="22" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="730" y="626" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700" letter-spacing="1">⚡ REDIS 7</text>
  <text x="730" y="646" text-anchor="middle" fill="#f87171" font-size="10">Alpine · :6379</text>

  <rect x="616" y="660" width="228" height="46" rx="5" fill="#0f172a" stroke="#991b1b" stroke-width="0.7"/>
  <text x="730" y="677" text-anchor="middle" fill="#fecaca" font-size="9" font-weight="500">Caching Layer</text>
  <text x="730" y="694" text-anchor="middle" fill="#fecaca" font-size="9">Key-Value · Hash · TTL ops</text>

  <text x="730" y="728" text-anchor="middle" fill="#ef4444" font-size="8">fakeredis in test fixtures</text>

  <!-- ==================== REDISINSIGHT ==================== -->
  <rect x="890" y="600" width="260" height="78" rx="10" fill="#1e293b" stroke="#f87171" stroke-width="1" filter="url(#shadow)"/>
