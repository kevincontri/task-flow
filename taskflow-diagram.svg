  <text x="1020" y="660" text-anchor="middle" fill="#64748b" font-size="8">Database visualization</text>

  <!-- ==================== TESTING ==================== -->
  <rect x="890" y="700" width="260" height="70" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <text x="1020" y="724" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">🧪 Testing</text>
  <text x="1020" y="742" text-anchor="middle" fill="#94a3b8" font-size="9">pytest + pytest-asyncio</text>
  <text x="1020" y="758" text-anchor="middle" fill="#94a3b8" font-size="9">fakeredis · conftest fixtures</text>

  <!-- ==================== SWAGGER DOCS ==================== -->
  <rect x="790" y="270" width="170" height="60" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <text x="875" y="296" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">📄 Swagger UI</text>
  <text x="875" y="312" text-anchor="middle" fill="#94a3b8" font-size="9">/docs · OpenAPI 3.1</text>
  <text x="875" y="324" text-anchor="middle" fill="#64748b" font-size="8">Auto-generated from FastAPI</text>

  <!-- ==================== RENDER DEPLOY ==================== -->
  <rect x="890" y="380" width="260" height="60" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="1" filter="url(#shadow)"/>
  <text x="1020" y="404" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600">☁️ Render (Deploy)</text>
  <text x="1020" y="420" text-anchor="middle" fill="#94a3b8" font-size="9">task-flow-1-vuz1.onrender.com</text>
  <text x="1020" y="434" text-anchor="middle" fill="#64748b" font-size="8">Production hosting</text>

  <!-- ==================== FLOW ARROWS ==================== -->

  <!-- Browser → Frontend -->
  <line x1="155" y1="218" x2="155" y2="256" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)" stroke-dasharray="4,3"/>
  <text x="170" y="242" fill="#64748b" font-size="8">HTTP</text>

  <!-- Frontend → Backend (Axios / REST) -->
  <line x1="240" y1="420" x2="306" y2="370" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <rect x="248" y="372" width="52" height="16" rx="3" fill="#0e7490" opacity="0.6"/>
  <text x="274" y="383" text-anchor="middle" fill="#22d3ee" font-size="8" font-weight="600">Axios</text>

  <!-- Backend response arrow -->
  <line x1="306" y1="400" x2="240" y2="450" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowCyan)"/>
  <text x="260" y="440" fill="#22d3ee" font-size="7">JSON + JWT</text>

  <!-- Routes → Services -->
  <line x1="526" y1="350" x2="530" y2="350" stroke="#4ade80" stroke-width="1.3" marker-end="url(#arrowGreen)"/>
  <rect x="526" y="342" width="8" height="16" rx="2" fill="none"/>

  <!-- Services → Repositories -->
  <line x1="526" y1="380" x2="426" y2="396" stroke="#4ade80" stroke-width="1.2" marker-end="url(#arrowGreen)" stroke-dasharray="3,2"/>

  <!-- Services → Redis Repo -->
  <line x1="634" y1="390" x2="634" y2="396" stroke="#f87171" stroke-width="1.2" marker-end="url(#arrowRed)" stroke-dasharray="3,2"/>

  <!-- Repositories → PostgreSQL -->
  <line x1="426" y1="522" x2="426" y2="596" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="404" y="558" width="68" height="16" rx="3" fill="#6d28d9" opacity="0.4"/>
  <text x="438" y="569" text-anchor="middle" fill="#c4b5fd" font-size="8" font-weight="600">asyncpg</text>

  <!-- Redis Repo → Redis -->
  <line x1="634" y1="456" x2="700" y2="596" stroke="#f87171" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="640" y="520" width="72" height="16" rx="3" fill="#991b1b" opacity="0.4"/>
  <text x="676" y="531" text-anchor="middle" fill="#fca5a5" font-size="8" font-weight="600">redis.asyncio</text>

  <!-- Redis → RedisInsight -->
  <line x1="860" y1="640" x2="886" y2="640" stroke="#f87171" stroke-width="1" marker-end="url(#arrowRed)" stroke-dasharray="4,3"/>

  <!-- Backend → Swagger -->
  <line x1="750" y1="290" x2="786" y2="290" stroke="#fcd34d" stroke-width="1" marker-end="url(#arrowWhite)" stroke-dasharray="4,3"/>

  <!-- ==================== LEGEND ==================== -->
  <rect x="890" y="470" width="260" height="108" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="1020" y="490" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="0.8">LEGEND</text>

  <line x1="906" y1="504" x2="936" y2="504" stroke="#22d3ee" stroke-width="2"/>
  <text x="944" y="508" fill="#94a3b8" font-size="8">HTTP / REST (Axios)</text>

  <line x1="906" y1="520" x2="936" y2="520" stroke="#a78bfa" stroke-width="2"/>
  <text x="944" y="524" fill="#94a3b8" font-size="8">Database connection (asyncpg)</text>

  <line x1="906" y1="536" x2="936" y2="536" stroke="#f87171" stroke-width="2"/>
  <text x="944" y="540" fill="#94a3b8" font-size="8">Redis connection (redis.asyncio)</text>

  <line x1="906" y1="552" x2="936" y2="552" stroke="#4ade80" stroke-width="1.3"/>
  <text x="944" y="556" fill="#94a3b8" font-size="8">Internal layer communication</text>

  <line x1="906" y1="568" x2="936" y2="568" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="944" y="572" fill="#94a3b8" font-size="8">Dev / tooling connection</text>

  <!-- ==================== TECH BADGES ==================== -->
  <rect x="30" y="88" width="250" height="3" rx="1.5" fill="#60a5fa" opacity="0.6"/>
